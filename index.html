<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moody CALC</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Moody CALC">
<meta name="theme-color" content="#0a0a0a">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a;
  color: #f0f0f0;
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  padding: 36px 28px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #e62020, #ff4444, #990000);
}

.logo {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  object-fit: cover;
  display: block;
  margin: 0 auto 16px;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
  color: #fff;
}

.rate-bar {
  text-align: center;
  font-size: 11px;
  color: #444;
  letter-spacing: 1px;
  margin-bottom: 28px;
  min-height: 16px;
}

.rate-bar span { color: #e62020; }

label {
  display: block;
  font-size: 11px;
  color: #444;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.input-row {
  display: flex;
  align-items: center;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  margin-bottom: 20px;
  transition: border-color 0.2s;
  overflow: hidden;
}

.input-row:focus-within { border-color: #e62020; }
.input-row.error { border-color: #e62020 !important; }

.input-row input {
  flex: 1;
  background: transparent;
  border: none;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 34px;
  font-weight: 700;
  padding: 18px 16px;
  outline: none;
  -moz-appearance: textfield;
}

.input-row input::-webkit-outer-spin-button,
.input-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
.input-row input::placeholder { color: #2a2a2a; }

.currency-tag {
  font-size: 13px;
  font-weight: 700;
  color: #444;
  padding: 0 16px 0 0;
  letter-spacing: 1px;
  flex-shrink: 0;
}

button.calc {
  width: 100%;
  background: #e62020;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Courier New', monospace;
  font-size: 17px;
  font-weight: 700;
  padding: 18px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}

button.calc:hover { opacity: 0.85; }
button.calc:active { transform: scale(0.98); }
button.calc:disabled { opacity: 0.4; cursor: not-allowed; }

.result {
  display: none;
  margin-top: 24px;
  background: #1a0a0a;
  border: 1px solid #e6202055;
  border-radius: 14px;
  padding: 24px;
  animation: up 0.3s ease both;
}

.result.show { display: block; }

@keyframes up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.steps-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}

.srow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: #444;
  border-bottom: 1px solid #1f1f1f;
  padding-bottom: 8px;
}

.srow:last-child { border-bottom: none; padding-bottom: 0; }
.srow .sval { color: #ccc; font-weight: 600; }
.srow .sval.red { color: #e62020; }

.result-label {
  font-size: 11px;
  color: #e62020;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
  text-align: center;
}

.result-num {
  font-size: 52px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -2px;
  text-align: center;
}

button.reset {
  display: none;
  width: 100%;
  background: transparent;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: #444;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  padding: 12px;
  cursor: pointer;
  margin-top: 12px;
  transition: border-color 0.2s, color 0.2s;
}

button.reset.show { display: block; }
button.reset:hover { border-color: #555; color: #f0f0f0; }

.offline-note {
  text-align: center;
  font-size: 10px;
  color: #333;
  margin-top: 16px;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="icon.png" alt="Moody CALC" />
  <h1>Moody CALC</h1>
  <div class="rate-bar" id="rateBar">Kurs yuklanmoqda...</div>

  <label for="inp">Yuan (CNY) miqdori</label>
  <div class="input-row" id="inputRow">
    <input type="number" id="inp" placeholder="0" autocomplete="off" />
    <span class="currency-tag">CNY</span>
  </div>

  <button class="calc" id="calcBtn" onclick="calc()" disabled>Hisoblash &rarr;</button>

  <div class="result" id="result">
    <div class="steps-list" id="stepsList"></div>
    <div class="result-label">Yakuniy natija</div>
    <div class="result-num" id="rnum"></div>
  </div>

  <button class="reset" id="resetBtn" onclick="resetAll()">&#8635; Qayta</button>
  <div class="offline-note" id="offlineNote"></div>
</div>

<script>
var rate = null;
var FALLBACK_RATE = 0.1385;

function fd(n) {
  return '$' + (Math.round(n * 100) / 100).toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function fc(n) {
  return (Math.round(n * 100) / 100).toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

async function fetchRate() {
  try {
    var res = await fetch('https://open.er-api.com/v6/latest/CNY');
    var data = await res.json();
    if (data && data.rates && data.rates.USD) {
      rate = data.rates.USD;
      showRate(rate, false);
      return;
    }
  } catch(e) {}

  try {
    var res2 = await fetch('https://api.frankfurter.app/latest?from=CNY&to=USD');
    var data2 = await res2.json();
    if (data2 && data2.rates && data2.rates.USD) {
      rate = data2.rates.USD;
      showRate(rate, false);
      return;
    }
  } catch(e) {}

  rate = FALLBACK_RATE;
  showRate(rate, true);
}

function showRate(r, isFallback) {
  var bar = document.getElementById('rateBar');
  if (isFallback) {
    bar.innerHTML = '1 CNY &asymp; <span>$' + r.toFixed(4) + '</span> (taxminiy)';
    document.getElementById('offlineNote').textContent = 'Internet yo\'q — taxminiy kurs ishlatilmoqda';
  } else {
    bar.innerHTML = '1 CNY &asymp; <span>$' + r.toFixed(4) + '</span> · jonli kurs';
  }
  document.getElementById('calcBtn').disabled = false;
}

function row(label, val, isRed) {
  return '<div class="srow"><span>' + label + '</span><span class="sval' + (isRed ? ' red' : '') + '">' + val + '</span></div>';
}

function calc() {
  var inp = document.getElementById('inp');
  var val = inp.value.trim();
  if (val === '' || isNaN(val) || parseFloat(val) <= 0) {
    document.getElementById('inputRow').classList.add('error');
    setTimeout(function(){ document.getElementById('inputRow').classList.remove('error'); }, 800);
    return;
  }

  var cny = parseFloat(val);

  // 1. +3%
  var cny3 = cny + cny * 0.03;

  // 2. CNY → USD
  var usd = cny3 * rate;

  var html = '';
  html += row('Boshlang\'ich: ' + fc(cny) + ' CNY', '', false);
  html += row('+3% qo\'shildi', fc(cny3) + ' CNY', false);
  html += row('Dollarga o\'tkazildi', fd(usd), false);

  var result;

  if (usd > 200) {
    // −200, +30%, +215
    var s1 = usd - 200;
    var s2 = s1 + s1 * 0.30;
    var s3 = s2 + 215;
    html += row('$200 dan katta → −200', fd(s1), false);
    html += row('+30% qo\'shildi', fd(s2), false);
    html += row('+215 qo\'shildi', fd(s3), false);
    result = s3;
  } else {
    // +15
    var s1 = usd + 15;
    html += row('$200 dan kichik → +$15', fd(s1), false);
    result = s1;
  }

  document.getElementById('stepsList').innerHTML = html;
  document.getElementById('rnum').textContent = fd(result);
  document.getElementById('result').classList.add('show');
  document.getElementById('resetBtn').classList.add('show');
}

function resetAll() {
  document.getElementById('inp').value = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('inp').focus();
}

document.getElementById('inp').addEventListener('keydown', function(e){
  if (e.key === 'Enter') calc();
});

fetchRate();
</script>
</body>
</html>
