<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moody CALC</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Moody CALC">
<meta name="theme-color" content="#0a0a0a">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a;
  color: #f0f0f0;
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  padding: 36px 28px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #e62020, #ff4444, #990000);
}

.logo {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  object-fit: cover;
  display: block;
  margin: 0 auto 16px;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 32px;
  color: #fff;
}

label {
  display: block;
  font-size: 11px;
  color: #444;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

input[type=number] {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 34px;
  font-weight: 700;
  padding: 18px 20px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 20px;
  -moz-appearance: textfield;
}

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number]:focus { border-color: #e62020; }
input[type=number]::placeholder { color: #2a2a2a; }
input.error { border-color: #e62020 !important; }

button.calc {
  width: 100%;
  background: #e62020;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Courier New', monospace;
  font-size: 17px;
  font-weight: 700;
  padding: 18px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}

button.calc:hover { opacity: 0.85; }
button.calc:active { transform: scale(0.98); }

.result {
  display: none;
  margin-top: 24px;
  background: #1a0a0a;
  border: 1px solid #e6202055;
  border-radius: 14px;
  padding: 28px 24px;
  text-align: center;
  animation: up 0.3s ease both;
}

.result.show { display: block; }

@keyframes up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.result-label {
  font-size: 11px;
  color: #e62020;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.result-num {
  font-size: 52px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -2px;
}

button.reset {
  display: none;
  width: 100%;
  background: transparent;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: #444;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  padding: 12px;
  cursor: pointer;
  margin-top: 12px;
  transition: border-color 0.2s, color 0.2s;
}

button.reset.show { display: block; }
button.reset:hover { border-color: #555; color: #f0f0f0; }
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="icon.png" alt="Moody CALC" />
  <h1>Moody CALC</h1>

  <label for="inp">Son kiriting</label>
  <input type="number" id="inp" placeholder="0" autocomplete="off" />

  <button class="calc" onclick="calc()">Hisoblash &rarr;</button>

  <div class="result" id="result">
    <div class="result-label">Natija</div>
    <div class="result-num" id="rnum"></div>
  </div>

  <button class="reset" id="resetBtn" onclick="resetAll()">&#8635; Qayta</button>
</div>

<script>
function f(n) {
  var r = Math.round(n * 100) / 100;
  return r.toLocaleString('ru-RU');
}

function calc() {
  var inp = document.getElementById('inp');
  var val = inp.value.trim();
  if (val === '' || isNaN(val)) {
    inp.classList.add('error');
    setTimeout(function(){ inp.classList.remove('error'); }, 800);
    return;
  }
  var X = parseFloat(val);
  var s1 = X + X * 0.03;
  var s2 = s1 - 200;
  var s3 = s2 + s2 * 0.30;
  var s4 = s3 + 200;

  document.getElementById('rnum').textContent = f(s4);
  document.getElementById('result').classList.add('show');
  document.getElementById('resetBtn').classList.add('show');
}

function resetAll() {
  document.getElementById('inp').value = '';
  document.getElementById('result').classList.remove('show');
  document.getElementById('resetBtn').classList.remove('show');
  document.getElementById('inp').focus();
}

document.getElementById('inp').addEventListener('keydown', function(e){
  if (e.key === 'Enter') calc();
});
</script>
</body>
</html>
